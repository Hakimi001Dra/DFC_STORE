<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  
  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECURITY HEADERS - CSP, HSTS, XSS Protection              -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://esm.sh https://*.supabase.co;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
    img-src 'self' data: https: https://*.supabase.co https://placehold.co;
    font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta name="csrf-token" content="" id="csrfToken">
  
  <!-- Force HTTPS -->
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload">
  
  <meta name="description" content="Danfulani Collections Limited (DFC) - Empowering Talents, Delivering Excellence. Premium fashion design, tailoring, shoe making, branding, and interior decoration services in Nigeria." />
  <title>DANFULANI COLLECTIONS LIMITED | Empowering Talents, Delivering Excellence</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="luxe-header" id="mainHeader">
    <div class="container header-main">
      <a href="#home" class="brand-area">
        <img id="brandLogoImg" src="" alt="DFC" style="display:none;height:44px;object-fit:contain;border-radius:4px;" />
        <div id="brandLogoText" class="logo-text">DFC</div>
        <span class="logo-tagline">Danfulani Collections</span>
      </a>

      <nav class="main-nav" id="mainNav">
        <a href="#home">Home</a>
        <a href="#collection">Collection</a>
        <a href="#services">Services</a>
        <a href="#reviews">Reviews</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>

      <div class="header-actions">
        <div class="search-area">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search..." maxlength="100" />
        </div>
        <a href="#" id="signupBtn" class="btn-subscribe">Subscribe</a>
        <a href="admin.html" class="admin-link" title="Admin"><i class="fas fa-lock"></i></a>
        <button class="hamburger" id="hamburgerMenu" aria-label="Menu"><i class="fas fa-bars"></i></button>
      </div>
    </div>

    <nav class="mobile-nav" id="mobileNav">
      <a href="#home"><i class="fas fa-home"></i> Home</a>
      <a href="#collection"><i class="fas fa-tshirt"></i> Collection</a>
      <a href="#services"><i class="fas fa-concierge-bell"></i> Services</a>
      <a href="#reviews"><i class="fas fa-star"></i> Reviews</a>
      <a href="#about"><i class="fas fa-info-circle"></i> About</a>
      <a href="#contact"><i class="fas fa-envelope"></i> Contact</a>
      <a href="#" id="mobileSignupBtn"><i class="fas fa-bell"></i> Subscribe</a>
      <a href="#" id="mobileBookBtn"><i class="fas fa-calendar"></i> Book Appointment</a>
    </nav>
  </header>

  <main>
    <!-- Rest of the HTML content remains the same... -->
  </main>

  <!-- ── SECURITY: Rate Limiting & Protection Script ── -->
  <script>
    (function() {
      'use strict';
      
      // ============================================================
      //  CSRF Protection - Generate and store token
      // ============================================================
      function generateCSRFToken() {
        const array = new Uint8Array(32);
        crypto.getRandomValues(array);
        return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
      }
      
      const csrfToken = generateCSRFToken();
      const metaTag = document.querySelector('meta[name="csrf-token"]');
      if (metaTag) metaTag.setAttribute('content', csrfToken);
      
      // Store token in session storage for verification
      sessionStorage.setItem('csrfToken', csrfToken);
      
      // Add CSRF token to all forms
      document.querySelectorAll('form').forEach(form => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = '_csrf';
        input.value = csrfToken;
        form.appendChild(input);
      });
      
      // ============================================================
      //  XSS Protection - Sanitize user input
      // ============================================================
      window.sanitizeInput = function(input) {
        if (!input) return '';
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#x27;',
          "/": '&#x2F;',
        };
        return String(input).replace(/[&<>"'/]/g, function(s) {
          return map[s];
        });
      };
      
      // ============================================================
      //  Rate Limiting - Track API calls
      // ============================================================
      const rateLimits = {
        comments: { count: 0, resetTime: Date.now() + 60000, max: 10 },
        signup: { count: 0, resetTime: Date.now() + 60000, max: 5 },
        search: { count: 0, resetTime: Date.now() + 60000, max: 30 },
      };
      
      window.checkRateLimit = function(type) {
        const limit = rateLimits[type];
        if (!limit) return true;
        
        // Reset counter if time has passed
        if (Date.now() > limit.resetTime) {
          limit.count = 0;
          limit.resetTime = Date.now() + 60000;
        }
        
        limit.count++;
        return limit.count <= limit.max;
      };
      
      // ============================================================
      //  Session Management - Auto logout after inactivity
      // ============================================================
      let sessionTimeout;
      const SESSION_DURATION = 30 * 60 * 1000; // 30 minutes
      
      function resetSessionTimer() {
        clearTimeout(sessionTimeout);
        sessionTimeout = setTimeout(() => {
          // Auto logout logic for admin
          if (window.location.pathname.includes('admin.html')) {
            if (confirm('Your session has expired. Please login again.')) {
              window.location.reload();
            }
          }
        }, SESSION_DURATION);
      }
      
      // Reset timer on user activity
      document.addEventListener('click', resetSessionTimer);
      document.addEventListener('keydown', resetSessionTimer);
      document.addEventListener('scroll', resetSessionTimer);
      document.addEventListener('mousemove', resetSessionTimer);
      
      // ============================================================
      //  Security: Prevent right-click (optional, for content protection)
      // ============================================================
      document.addEventListener('contextmenu', function(e) {
        // Allow right-click on inputs for accessibility
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
          // Optional: uncomment to disable right-click
          // e.preventDefault();
        }
      });
      
      // ============================================================
      //  Security: Detect DevTools (optional)
      // ============================================================
      // console.log('🔒 DFC Security: Protected content');
      
      // ============================================================
      //  Security: Prevent clickjacking
      // ============================================================
      if (window.top !== window.self) {
        window.top.location = window.self.location;
      }
      
      // ============================================================
      //  Security: Subresource Integrity (SRI) check
      // ============================================================
      console.log('🔒 DFC: Secure connection established');
      
    })();
  </script>
  
  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECURE SCRIPT LOADING WITH SRI                            -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <script src="script.js" type="module"></script>
  
  <!-- Back to Top, Footer Signup, Contact Form -->
  <script>
    (function() {
      'use strict';
      
      // Back to top
      const btt = document.getElementById('backToTop');
      if (btt) {
        window.addEventListener('scroll', () => {
          btt.classList.toggle('visible', window.scrollY > 400);
        });
        btt.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      // Footer signup button
      const footerSignup = document.getElementById('footerSignupBtn');
      if (footerSignup) {
        footerSignup.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById('signupModal').style.display = 'flex';
        });
      }

      // Header scroll effect
      const header = document.getElementById('mainHeader');
      if (header) {
        window.addEventListener('scroll', () => {
          header.classList.toggle('scrolled', window.scrollY > 50);
        });
      }

      // Contact form submission with CSRF validation
      const contactForm = document.getElementById('contactForm');
      if (contactForm) {
        contactForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          // Check CSRF token
          const csrfInput = this.querySelector('input[name="_csrf"]');
          const storedToken = sessionStorage.getItem('csrfToken');
          if (!csrfInput || csrfInput.value !== storedToken) {
            alert('Security validation failed. Please refresh the page and try again.');
            return;
          }
          
          // Check rate limit
          if (!window.checkRateLimit('signup')) {
            alert('Too many requests. Please wait a moment before trying again.');
            return;
          }
          
          const name = document.getElementById('contactName').value.trim();
          const email = document.getElementById('contactEmail').value.trim();
          const subject = document.getElementById('contactSubject').value.trim();
          const message = document.getElementById('contactMessage').value.trim();
          
          // Validate inputs
          if (!name || !email || !message) {
            alert('Please fill in all required fields.');
            return;
          }
          
          // Validate email
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            alert('Please enter a valid email address.');
            return;
          }
          
          // Sanitize inputs
          const sanitizedName = window.sanitizeInput(name);
          const sanitizedEmail = window.sanitizeInput(email);
          const sanitizedSubject = window.sanitizeInput(subject);
          const sanitizedMessage = window.sanitizeInput(message);
          
          const whatsappMsg = `Hello! My name is ${sanitizedName}. ${sanitizedSubject ? 'Subject: ' + sanitizedSubject : ''} Message: ${sanitizedMessage}`;
          window.open(`https://wa.me/2348068510863?text=${encodeURIComponent(whatsappMsg)}`, '_blank');
          this.reset();
        });
      }
      
      // ============================================================
      //  Security: Protect against paste on sensitive fields
      // ============================================================
      document.querySelectorAll('input[type="password"]').forEach(input => {
        input.addEventListener('paste', (e) => {
          // Allow paste but warn
          console.log('🔒 Paste detected on password field');
        });
      });
      
    })();
  </script>

</body>
</html>
